name: Tests

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test type"
        required: true
        type: choice
        options:
          - api
          - ui
          - trx
          - all
        default: api
      test_suite:
        description: "Test suite"
        required: true
        type: choice
        options:
          - smoke
          - regression
          - extended
          - all
        default: smoke
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - demo
        default: demo

jobs:
  tests:
    name: "${{ inputs.test_type }} / ${{ inputs.test_suite }} @ ${{ inputs.environment }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        if: ${{ inputs.test_type == 'ui' || inputs.test_type == 'all' }}
        run: playwright install chromium

      - name: Build pytest mark expression
        id: marks
        run: |
          TYPE="${{ inputs.test_type }}"
          SUITE="${{ inputs.test_suite }}"
          if [ "$TYPE" == "all" ] && [ "$SUITE" == "all" ]; then
            echo "expr=" >> $GITHUB_OUTPUT
          elif [ "$TYPE" == "all" ]; then
            echo "expr=-m $SUITE" >> $GITHUB_OUTPUT
          elif [ "$SUITE" == "all" ]; then
            echo "expr=-m $TYPE" >> $GITHUB_OUTPUT
          else
            echo "expr=-m '$TYPE and $SUITE'" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: pytest tests/ -v --alluredir=allure-results --env=${{ inputs.environment }} ${{ steps.marks.outputs.expr }}
        env:
          TEST_POOL_ID: ${{ secrets.TEST_POOL_ID }}
          TEST_WALLET_ADDRESS: ${{ secrets.TEST_WALLET_ADDRESS }}
          POOL_SINGLE_TOKEN_ID: ${{ secrets.POOL_SINGLE_TOKEN_ID }}
          POOL_MIN_DEPOSIT_ID: ${{ secrets.POOL_MIN_DEPOSIT_ID }}
          WALLET_ZERO_BALANCE: ${{ secrets.WALLET_ZERO_BALANCE }}
          WALLET_NO_ETH: ${{ secrets.WALLET_NO_ETH }}
          WALLET_TRX_ADDRESS: ${{ secrets.WALLET_NO_ETH }}
          WALLET_TRX_PRIVATE_KEY: ${{ secrets.WALLET_NO_ETH }}

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Load Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous history into results
        if: always()
        run: |
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history allure-results/history
          fi

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
